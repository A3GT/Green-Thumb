{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenThumb | Home</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>


    <link rel="stylesheet" href="{% static 'store/css/nav.css' %}">
    <link rel="stylesheet" href="{% static 'store/css/home.css' %}">
</head>

<body data-page="index" data-static-root="{% get_static_prefix %}">

    <div class="navbar">
        <a class="brand" href="{% url 'home' %}">Green Thumb</a>
        <a href="{% url 'home' %}" data-link="index">Home</a>
        <a href="{% url 'shop' %}" data-link="shop">Shop</a>
        <a href="{% url 'reviews' %}" data-link="reviews">Reviews</a>
        <a href="{% url 'about' %}" data-link="about">About</a>

        <a class="cart-link" href="{% url 'cart' %}" data-link="cart" aria-label="Cart">
            &#128722;
            <span class="cart-count" id="cart-count">0</span>
        </a>

        <a class="account-link" href="{% url 'login' %}" aria-label="Login">
            &#128100;
        </a>
    </div>

   <div class="home-section"> 
        <div class="home-content">
        <h1>Green Thumb</h1>

        <p class="hero-subtext">
            A place where we can make environmentally conscious choices by offering
            reusable, eco-friendly products that reduce waste and support a greener lifestyle!
        </p>
        </div>

        <div class="outer_generator">
            <div class="inner_generator">

                <div class="plant_display">
                    <div class="generated">
                        <img id="generated_plant"
                             class="generated"
                             alt="plant"
                             src="{% static 'images/plants/wheel.png' %}">
                    </div>

                    <p id="generated_plant_description" class="generated"></p>
                </div>

                <div class="generator-buttons">
                    <button class="generate"
                            id="generate_button"
                            onclick="generate_plant()">
                        Generate a Plant
                    </button>

                    <button class="generate"
                            id="shop_button"
                            onclick="plant_in_shop()"
                            style="visibility: hidden;">
                        Add to Cart
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script src="{% static 'store/js/home.js' %}"></script>
    <script src="{% static 'store/js/common.js' %}"></script>

</body>
</html>
