<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
</head>
<body>
    <h1>Create an Account</h1>

    <!-- Display the registration form -->
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
    </form>

    <p>Already have an account?</p>
    <a href="{% url 'login' %}">Go to Login</a>
</body>
</html>
